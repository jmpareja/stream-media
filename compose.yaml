services:
  catalog-service:
    build:
      context: .
      target: catalog-service
    container_name: stream-media-catalog
    ports:
      - "3001:3001"
    environment:
      - CATALOG_PORT=3001
      - DATABASE_PATH=/data/catalog.db
      - RUST_LOG=catalog_service=info,tower_http=info
    volumes:
      - catalog-data:/data
    restart: unless-stopped

  streaming-service:
    build:
      context: .
      target: streaming-service
    container_name: stream-media-streaming
    ports:
      - "3002:3002"
    environment:
      - STREAMING_PORT=3002
      - CATALOG_URL=http://catalog-service:3001
      - MEDIA_STORE_PATH=/data/media-store
      - TRANSCODE_MAX_JOBS=2
      - RUST_LOG=streaming_service=info,tower_http=info
    volumes:
      - media-data:/data/media-store
    depends_on:
      - catalog-service
    restart: unless-stopped

  user-service:
    build:
      context: .
      target: user-service
    container_name: stream-media-user
    ports:
      - "3003:3003"
    environment:
      - USER_PORT=3003
      - USER_DATABASE_PATH=/data/users.db
      - RUST_LOG=user_service=info,tower_http=info
    volumes:
      - user-data:/data
    restart: unless-stopped

  gateway:
    build:
      context: .
      target: gateway
    container_name: stream-media-gateway
    ports:
      - "3000:3000"
    environment:
      - GATEWAY_PORT=3000
      - CATALOG_URL=http://catalog-service:3001
      - STREAMING_URL=http://streaming-service:3002
      - USER_URL=http://user-service:3003
      - RUST_LOG=gateway=info,tower_http=info
    depends_on:
      - catalog-service
      - streaming-service
      - user-service
    restart: unless-stopped

volumes:
  catalog-data:
  media-data:
  user-data:
